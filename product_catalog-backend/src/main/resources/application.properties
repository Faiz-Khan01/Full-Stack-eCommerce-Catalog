server.port=${PORT:8082}
spring.application.name=productcatalog

# Database Configuration (With local fallback values)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/product_catalog}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (With local fallback key)
app.jwt.secret=${JWT_SECRET:mySecretKey12345mySecretKey12345mySecretKey12345}
app.jwt.expiration-ms=86400000

# Razorpay Configuration (Direct strings or clear variables)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_SqmYYblrO4yuhQ}
