# Server Configuration
# Render provides the PORT variable automatically
server.port=${PORT:8082}
spring.application.name=productcatalog

# Database Configuration
# This uses environment variables first, falling back to localhost for your local dev work
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/product_catalog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Recommended: Add a driver class name to avoid ambiguity
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# 'update' is fine for dev, but ensures tables are created/updated
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use the modern Dialect (MySQLDialect covers MySQL 5, 8, and beyond)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# This helps prevent the "Unable to determine Dialect" error by giving Hibernate a hint
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# JWT Configuration
# Ensure your secret is long enough (256-bit) to avoid security exceptions
app.jwt.secret=${JWT_SECRET:mySecretKey12345mySecretKey12345mySecretKey12345mySecretKey12345}
# Fixed: Added a zero for a full 24-hour expiration (86,400,000 ms)
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
